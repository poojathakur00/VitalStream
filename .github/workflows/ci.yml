name: VitalStream CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pyspark==3.5.0 psycopg2-binary fastapi httpx

      - name: Run EWS scorer tests
        run: |
          python -m pytest processor/tests/test_ews_scorer.py -v

      - name: Validate docker-compose
        run: |
          docker compose config --quiet && echo "docker-compose valid"